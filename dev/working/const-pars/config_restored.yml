# config_restored.yml — ADR 0001 step 2 restored-candidate build config (t260719a)
#
# Derived from config_baseline.yml (pinned git 48bc1d3). Differs from the baseline
# ONLY in the setup_constant_pars block: it restores the 13 gate-passing constants
# under their Wflow.jl 1.x CSDMS Standard Names, alongside the retained KsatHorFrac.
# All 13 passed the fail-closed two-sided equivalence gate
# (dev/working/const-pars/equivalence-gate-log.md); none held out. The deprecated
# InfiltCapSoil (wflow_v1: None) stays dropped.
#
# Build with: model_build_config: dev/working/const-pars/config_restored.yml
# This candidate is promoted to config/wflow_build_model.yml only after the ADR 0001
# validation protocol blesses the discharge move (steps 4b/5/7).
modeltype: wflow_sbm

steps:
  - setup_basemaps:
      hydrography_fn: merit_hydro_ihu   # source hydrography data {merit_hydro, merit_hydro_1k}
      basin_index_fn: merit_hydro_index # source of basin index corresponding to hydrography_fn
      upscale_method: ihu               # upscaling method for flow direction data, by default 'ihu'

  - setup_rivers:
      hydrography_fn: merit_hydro_ihu   # source hydrography data, should match basemaps source
      river_geom_fn: rivers_lin2019_v1  # river source data with river width and bankfull discharge
      river_upa: 32                     # minimum upstream area threshold for the river map [km2]
      slope_len: 2000                   # length over which to calculate river slope [m]
      rivdph_method: powlaw             # method to estimate depth {'powlaw', 'manning', 'gvf'}
      min_rivdph: 0.5                   # minimum river depth [m]
      min_rivwth: 30                    # minimum river width [m]
      smooth_len: 5000                  # length over which to smooth river depth and river width [m]

  - setup_lulcmaps:
      lulc_fn: vito                     # source for lulc maps: {globcover, vito, corine}

  - setup_laimaps:
      lai_fn: modis_lai                 # source for LAI: {modis_lai}

  - setup_soilmaps:
      soil_fn: soilgrids                # source for soilmaps: {soilgrids}
      ptf_ksatver: brakensiek           # pedotransfer function to calculate hydraulic conductivity: {brakensiek, cosby}

  # Restore the upstream Deltares-template constant parameters under Wflow.jl 1.x
  # CSDMS Standard Names. Rationale + evidence: ADR 0001
  # (dev/decisions/0001-restore-wflow-constant-parameters.md). Values are the git
  # 6ebc46f template; all 13 cleared the two-sided equivalence gate (units/sign/
  # scale/semantics preserved 0.x -> 1.x). Snow/soil/veg (8) pin the doc-template
  # default under a stable name (drift-protection); MaxLeakage=0 is the 9th proven
  # default-equal pin; the 4 glacier/InfiltCapPath values are explicit reference
  # choices that differ from the 1.x engine default. Do NOT re-drop without revising
  # ADR 0001.
  - setup_constant_pars:
      subsurface_water__horizontal_to_vertical_saturated_hydraulic_conductivity_ratio: 100  # KsatHorFrac (retained; required by Wflow.jl 1.x)
      snowpack__degree_day_coefficient: 3.75653          # Cfmax
      atmosphere_air__snowfall_temperature_threshold: 0  # TT
      atmosphere_air__snowfall_temperature_interval: 2   # TTI (template value; engine default 1.0)
      snowpack__melting_temperature_threshold: 0         # TTM
      snowpack__liquid_water_holding_capacity: 0.1       # WHC
      soil_surface_water__infiltration_reduction_parameter: 0.038                   # cf_soil
      vegetation_canopy_water__mean_evaporation_to_mean_precipitation_ratio: 0.11   # EoverR (template value; engine default 0.1)
      compacted_soil_surface_water__infiltration_capacity: 5                        # InfiltCapPath (reference choice; engine default 10)
      soil_water_saturated_zone_bottom__max_leakage_volume_flux: 0                  # MaxLeakage (9th default-equal pin; 1.x default resolved = 0)
      soil_wet_root__sigmoid_function_shape_parameter: -500                         # rootdistpar
      glacier_ice__degree_day_coefficient: 5.3                                      # G_Cfmax (reference choice; engine default 3.0)
      glacier_firn_accumulation__snowpack_dry_snow_leq_depth_fraction: 0.002        # G_SIfrac (reference choice; engine default 0.001)
      glacier_ice__melting_temperature_threshold: 1.3                              # G_TT (reference choice; engine default 0.0; g_ttm/g_tt collapse)
