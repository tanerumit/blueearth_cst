name: cst

channels:
  - conda-forge
  - nodefaults

channel_priority: strict

# notes R packages stats and utils were not found
dependencies:
  - cartopy
  - datrie # for snakemake
  - dvc
  - descartes
  - flit>=3.2
  - gcsfs>=2023.12.1
  - gdal>=3.1
  - geopandas>=0.10
  - graphviz # for snakemake
  - hydromt>=0.9.4
  - hydromt_wflow>=0.4.1, <0.6
  - jupyter # to run examples
  - matplotlib
  - numpy<2
  - pandas>=2.0.0
  - pip
  - python>=3.9, <3.12
  - r-base
  - r-doparallel
  - r-dplyr
  - r-e1071
  - r-fitdistrplus
  - r-foreach
  - r-forecast
  - r-ggplot2
  - r-ncdf4
  - r-patchwork
  - r-rlang
  - r-scales
  - r-tibble
  - r-tidyr
  - r-waveslim
  # base R (stats, utils, parallel) ships with r-base — no separate entry needed
  - scipy
  - seaborn # plot
  - shapely>=2.0.0
  - tabulate==0.8.10 # snakemake dependency, bug in v0.9.0
  - xarray>=2023.1,<=2024.3.0
  - xclim
  - zarr<3   # xarray 2024.3 predates zarr 3; pin v2 for compatibility
  - pip:
    - hydroengine
    - gwwapi
    - snakemake