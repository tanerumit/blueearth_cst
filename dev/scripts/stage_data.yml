# Config for dev/scripts/stage_data.py
#
# Stages a bbox-clipped subset of a remote data root onto a local path,
# mirroring the directory tree so an existing data catalog can simply have
# its `meta.root` swapped to point at the local copy.

source_root: P:/wflow_global/hydromt
target_root: C:/data/wflow_global/hydromt

# west, south, east, north (lon/lat).  Pad generously around the basin of
# interest so small region tweaks do not require re-staging.
bbox: [8.5, -0.5, 11.0, 1.5]

# Each dataset entry has:
#   name : friendly label used in logs
#   type : raster | raster_glob | vector | zarr | netcdf
#   path : path relative to source_root (mirrored under target_root)
#   pattern : glob, only for type=raster_glob (defaults to "*.tif")
datasets:
  - name: vito
    type: raster
    path: landuse/vito/ProbaV_LC100_epoch2015_global_v2.0.2_discrete-classification_EPSG-4326.tif

  - name: merit_hydro_ihu
    type: raster_glob
    path: topography/merit_hydro_ihu/30sec
    pattern: "*.tif"

  - name: modis_lai
    type: raster_glob
    path: landuse/modis/MODIS_MCD15A3H_LAI
    pattern: "*.tif"

  - name: soilgrids
    type: raster_glob
    path: soil/soilgrids_v1.0
    pattern: "*.tif"

  - name: basin_index
    type: vector
    path: topography/merit_hydro/basin_index.gpkg

  - name: rivers_lin2019
    type: vector
    path: hydrography/rivers_lin2019/rivers_ge30m.gpkg

  - name: era5_daily
    type: zarr
    path: meteo/era5_daily.zarr
    # The wflow forcing build only uses 2000-2020 (see snake config).
    # Limiting the time slice avoids streaming the full ~73-year zarr over SMB.
    time_range: ["2000-01-01", "2020-12-31"]

  - name: era5_orography
    type: netcdf
    path: meteo/era5/meta/era5_orography_2018.nc
