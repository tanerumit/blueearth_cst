[workspace]
name = "blueearth-cst"
description = "BlueEarth Climate Stress Test toolbox"
authors = ["Umit Taner <tanerumit@gmail.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

# Python + scientific stack — mirrors environment.yml.
[dependencies]
python = ">=3.12,<3.13"
pip = "*"
cartopy = "*"
dask = "*"          # used directly via dask.diagnostics in extract/get_stats scripts
datrie = "*"        # snakemake dep
dvc = "*"
descartes = "*"
flit = ">=3.2"
gcsfs = ">=2023.12.1"
gdal = ">=3.1"
geopandas = ">=0.10"
graphviz = "*"      # snakemake DAG renderer
hydromt = ">=1.3,<2"
hydromt_wflow = ">=1.0,<2"
jupyter = "*"       # examples notebooks
matplotlib = "*"
netcdf4 = "*"       # direct import in check_baseline + inspect scripts
numpy = "*"
pandas = ">=2.0.0"
pytest = "*"        # tests/ — was missing from environment.yml
pyyaml = "*"        # `import yaml` in many src/ + tests + dev scripts
rasterio = "*"      # direct import in dev/scripts/stage_data.py
scipy = "*"
seaborn = "*"
shapely = ">=2.0.0"
tabulate = "*"
xarray = "*"
xclim = "*"
zarr = "*"

# R toolchain — weathergenr itself is handled separately (see [tasks]).
r-base = "*"
r-devtools = "*"        # weathergenr install from GitHub or local
r-doparallel = "*"
r-dplyr = "*"
r-e1071 = "*"
r-fitdistrplus = "*"
r-foreach = "*"
r-forecast = "*"
r-ggplot2 = "*"
r-ncdf4 = "*"
r-patchwork = "*"
r-rlang = "*"
r-scales = "*"
r-tibble = "*"
r-tidyr = "*"
r-waveslim = "*"
r-yaml = "*"

# pip-only packages (not on conda-forge or simpler from PyPI)
[pypi-dependencies]
hydroengine = "*"
gwwapi = "*"
snakemake = "*"

# Single-command install for a fresh clone:
#     pixi install         # native deps from pixi.toml
#     pixi run install     # R + Julia layers wired below
[tasks]
verify-rdeps  = { cmd = "Rscript --vanilla dev/scripts/install_weathergenr.R", description = "Verify weathergenr v1.2.0 is installed and loadable (no install attempt)" }
install-julia = { cmd = "julia --project=. -e 'using Pkg; Pkg.instantiate()'", description = "Instantiate the Julia env from Manifest.toml" }
install       = { depends-on = ["verify-rdeps", "install-julia"], description = "Verify R deps + instantiate Julia env on top of pixi install" }
