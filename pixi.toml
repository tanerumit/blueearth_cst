[workspace]
name = "blueearth-cst"
description = "BlueEarth Climate Stress Test toolbox"
authors = ["Umit Taner <tanerumit@gmail.com>"]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64"]

# Python + scientific stack — mirrors environment.yml.
[dependencies]
python = ">=3.12,<3.13"
pip = "*"
cartopy = "*"
dask = "*"          # used directly via dask.diagnostics in extract/get_stats scripts
dvc = "*"
descartes = "*"
flit = ">=3.2"
gcsfs = ">=2023.12.1"
gdal = ">=3.1"
geopandas = ">=0.10"
graphviz = "*"      # snakemake DAG renderer
hydromt = ">=1.3,<2"
hydromt_wflow = ">=1.0,<2"
jupyter = "*"       # examples notebooks
matplotlib = "*"
netcdf4 = "*"       # direct import in check_baseline + inspect scripts
numpy = "*"
pandas = ">=2.0.0"
pytest = "*"        # tests/ — was missing from environment.yml
pyyaml = "*"        # `import yaml` in many src/ + tests + dev scripts
rasterio = "*"      # direct import in dev/scripts/stage_data.py
scipy = "*"
seaborn = "*"
shapely = ">=2.0.0"
tabulate = "*"
xarray = "*"
xclim = "*"
zarr = "*"

# R toolchain — weathergenr itself is handled separately (see [tasks]).
r-base = "4.4.*"        # pinned to 4.4: conda-forge's r45 r-waveslim build is broken on win-64
                        # (mingw "32 bit pseudo relocation out of range" crashes library(weathergenr));
                        # the r44 build loads fine. Pin is intentionally global (not win-64-only) to keep
                        # R at one version across platforms for reproducibility parity — linux-64 is
                        # unaffected by the bug but rides the same 4.4 for consistency. Revisit when
                        # conda-forge fixes the r45 Fortran build (see dev/followups.md).
r-remotes = ">=2.5.0,<3" # weathergenr install from GitHub (conda-forge r-pak is broken on win-64)
r-devtools = "*"        # dev convenience / local install fallback
r-doparallel = "*"
r-dplyr = "*"
r-e1071 = "*"
r-fitdistrplus = "*"
r-foreach = "*"
r-forecast = "*"
r-ggplot2 = "*"
r-ncdf4 = "*"
r-patchwork = "*"
r-rlang = "*"
r-scales = "*"
r-tibble = "*"
r-tidyr = "*"
r-waveslim = "*"
r-yaml = "*"

# pip-only packages (not on conda-forge or simpler from PyPI)
[pypi-dependencies]
hydroengine = "*"
gwwapi = "*"
snakemake = "*"

# Env activation. Applied on every `pixi shell` / `pixi run`, so these no longer
# have to be re-created by hand after each env rebuild (see docs/env_setup_notes.md).
[activation.env]
# HDF5 takes an flock-style lock by default; the Deltares P: SMB share rejects
# it, so netCDF4 reads fail mid-op. Disabling locking is also safe/recommended
# on network filesystems generally, hence set cross-platform.
HDF5_USE_FILE_LOCKING = "FALSE"

# Windows-only: recreate the ffi.dll / cairo.dll aliases graphviz needs.
[target.win-64.activation]
scripts = ["dev/scripts/pixi_activate.bat"]

# Single-command install for a fresh clone:
#     pixi install         # native deps from pixi.toml
#     pixi run install     # R + Julia layers wired below
[tasks]
# SSL_CERT_DIR/SSL_CERT_FILE are cleared for this task only: conda-forge's
# openssl activation points them at the pixi env cert store, but that store's
# certs/ subdir is empty on win-64, so every Rscript call warns
# "ignoring SSL_CERT_DIR: no certificates found". Empty is treated as unset, so
# R's libcurl (Schannel on Windows) falls back to the OS trust store for the
# GitHub tarball download. Task-scoped so Python/hydromt TLS keep their certs.
install-rdeps = { cmd = "Rscript --vanilla dev/scripts/install_weathergenr.R", description = "Install weathergenr v1.2.0 via remotes (idempotent; lands in .libPaths()[1])", env = { SSL_CERT_DIR = "", SSL_CERT_FILE = "" } }
# SSL_CERT_DIR/SSL_CERT_FILE are cleared for this task only: conda-forge's
# openssl activation (etc/conda/activate.d/openssl_activate-win.*) points them at
# the pixi env cert store, and Julia forwards SSL_CERT_DIR to libcurl as CAPATH.
# Julia's Windows libcurl uses the Schannel backend, which does NOT support CAPATH
# -> a `curl_easy_setopt: 4` (CURLE_NOT_BUILT_IN) error on every Pkg download.
# Empty is treated as unset by NetworkOptions, so Julia falls back to its bundled
# CA (share/julia/cert.pem). Task-scoped so Python/hydromt TLS keep their certs.
install-julia = { cmd = "julia +1.11.7 --project=. -e 'using Pkg; Pkg.instantiate()'", description = "Instantiate the Julia env from Manifest.toml (needs juliaup-managed Julia 1.11.7 on PATH: `juliaup add 1.11.7`; conda-forge has no win-64 julia build)", env = { SSL_CERT_DIR = "", SSL_CERT_FILE = "" } }
install       = { depends-on = ["install-rdeps", "install-julia"], description = "Install weathergenr + instantiate Julia env on top of pixi install" }
